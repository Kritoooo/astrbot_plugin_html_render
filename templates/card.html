<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            /* 背景：极光渐变，比之前的深蓝紫色更通透 */
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            /* 毛玻璃效果 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 40px;
            /* 复合阴影，增加悬浮感 */
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.08),
                inset 0 0 0 1px rgba(255,255,255,0.6);
            line-height: 1.75;
            font-size: 16px;
            color: #2c3e50;
            width: 100%;
            max-width: 650px; /* 限制最大宽度，阅读体验更好 */
            min-width: 300px;
        }

        /* --- 以下是针对 Markdown 内容的排版优化 --- */
        
        /* 段落间距 */
        .card p { margin-bottom: 16px; text-align: justify; }
        .card p:last-child { margin-bottom: 0; }

        /* 标题样式 */
        .card h1, .card h2, .card h3 {
            color: #1a202c;
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .card h1 { font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .card h2 { font-size: 20px; }
        .card h3 { font-size: 18px; }

        /* 列表 */
        .card ul, .card ol { margin-bottom: 16px; padding-left: 24px; }
        .card li { margin-bottom: 6px; }

        /* 引用块 (类似 Note 效果) */
        .card blockquote {
            background: #f1f5f9;
            border-left: 5px solid #64748b;
            padding: 12px 16px;
            margin: 16px 0;
            border-radius: 4px;
            color: #475569;
            font-style: italic;
        }

        /* 行内代码 */
        .card code {
            background: #edf2f7;
            color: #d53f8c;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "JetBrains Mono", Consolas, monospace;
            font-size: 0.9em;
        }

        /* 代码块 (模拟 Mac 终端窗口) */
        .card pre {
            background: #2d3748;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            font-family: "JetBrains Mono", Consolas, monospace;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card pre code {
            background: none;
            color: inherit;
            padding: 0;
        }
        
        /* 分割线 */
        .card hr {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }

        /* 链接 */
        .card a { color: #3182ce; text-decoration: none; }
        .card a:hover { text-decoration: underline; }

    </style>
</head>
<body>
    <div class="card">{{content}}</div>
</body>
</html>
