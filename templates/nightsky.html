<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 星夜调色板 */
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --bg-elevated: #21262d;
            
            /* 文字颜色 - 柔和不刺眼 */
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            
            /* 强调色 - 低饱和度 */
            --accent-gold: #e3b341;
            --accent-purple: #a371f7;
            --accent-blue: #58a6ff;
            --accent-cyan: #56d4dd;
            --accent-pink: #db61a2;
            --accent-green: #3fb950;
            
            /* 发光效果 */
            --glow-gold: rgba(227, 179, 65, 0.3);
            --glow-purple: rgba(163, 113, 247, 0.3);
            --glow-blue: rgba(88, 166, 255, 0.25);
            
            /* 边框 */
            --border-default: #30363d;
            --border-muted: #21262d;
            
            /* 字体 */
            --font-title: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            --font-body: 'Noto Serif SC', "Microsoft YaHei", serif;
            
            /* ★ 固定内容宽度 */
            --content-width: 520px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            color: var(--text-primary);
            background: var(--bg-deep);
            padding: 30px;
            display: inline-block;
        }

        /* ==================== 主容器 - 星空卡片 ==================== */
        .night-page {
            background: linear-gradient(145deg, #1a1f2e 0%, var(--bg-card) 50%, #0f1318 100%);
            border: 1px solid var(--border-default);
            border-radius: 16px;
            padding: 40px 45px;
            position: relative;
            overflow: hidden;
            /* ★ 固定宽度 */
            width: var(--content-width);
            max-width: var(--content-width);
            /* 微光边框 */
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 8px 32px rgba(0,0,0,0.4),
                0 0 60px rgba(88, 166, 255, 0.05);
        }

        /* ==================== 星星装饰 ==================== */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        /* 生成多颗星星 */
        .star:nth-child(1) { width: 2px; height: 2px; top: 8%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { width: 3px; height: 3px; top: 12%; left: 78%; animation-delay: 0.5s; opacity: 0.8; }
        .star:nth-child(3) { width: 2px; height: 2px; top: 25%; left: 92%; animation-delay: 1s; }
        .star:nth-child(4) { width: 2px; height: 2px; top: 5%; left: 45%; animation-delay: 1.5s; opacity: 0.6; }
        .star:nth-child(5) { width: 3px; height: 3px; top: 18%; left: 5%; animation-delay: 2s; }
        .star:nth-child(6) { width: 2px; height: 2px; top: 35%; left: 88%; animation-delay: 0.3s; opacity: 0.7; }
        .star:nth-child(7) { width: 2px; height: 2px; top: 8%; left: 65%; animation-delay: 1.8s; }
        .star:nth-child(8) { width: 3px; height: 3px; top: 22%; left: 35%; animation-delay: 2.5s; opacity: 0.5; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 月亮装饰 */
        .moon {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(253, 230, 138, 0.4),
                0 0 40px rgba(253, 230, 138, 0.2);
            opacity: 0.9;
        }
        .moon::before {
            content: "";
            position: absolute;
            top: 3px;
            left: 6px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1318 100%);
            border-radius: 50%;
        }

        /* ==================== 内容区域 ==================== */
        .content {
            font-size: 17px;
            line-height: 2;
            position: relative;
            z-index: 1;
            /* ★ 限制宽度 */
            width: 100%;
            max-width: 100%;
        }

        /* ★★★ 全局强制换行（关键修复）★★★ */
        .content,
        .content * {
            max-width: 100% !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-wrap: anywhere !important;
            box-sizing: border-box !important;
            white-space: normal !important;
        }

        /* ==================== 段落与标题 ==================== */
        .content p {
            margin-bottom: 0.9em;
            text-indent: 2em;
            color: var(--text-primary);
        }
        .content p:last-child { margin-bottom: 0; }

        .content h1, .content h2, .content h3, .content h4 {
            font-family: var(--font-title);
            text-indent: 0;
            margin-top: 1.4em;
            margin-bottom: 0.7em;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--glow-gold);
        }
        .content h1 { font-size: 26px; }
        .content h2 { font-size: 22px; color: var(--accent-purple); text-shadow: 0 0 20px var(--glow-purple); }
        .content h3 { font-size: 19px; color: var(--accent-cyan); }

        /* ==================== 语义标签样式 ==================== */
        
        /* 对话 - 温暖金色 */
        q {
            display: inline;
            color: var(--accent-gold);
            font-style: normal;
            background: rgba(227, 179, 65, 0.1);
            padding: 3px 10px;
            border-radius: 6px;
            border-left: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(227, 179, 65, 0.1);
        }
        q::before { content: """; color: var(--accent-gold); opacity: 0.7; }
        q::after { content: """; color: var(--accent-gold); opacity: 0.7; }

        /* 内心想法 - 梦幻紫色 */
        inner {
            display: inline;
            color: var(--accent-purple);
            font-style: italic;
            background: rgba(163, 113, 247, 0.1);
            padding: 3px 12px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(163, 113, 247, 0.15);
        }
        inner::before { content: "（"; opacity: 0.6; }
        inner::after { content: "）"; opacity: 0.6; }

        /* 动作描写 - 清冷青色 */
        act {
            display: inline;
            color: var(--accent-cyan);
            font-weight: 500;
            text-decoration: underline;
            text-decoration-color: rgba(86, 212, 221, 0.4);
            text-decoration-style: dotted;
            text-underline-offset: 4px;
        }

        /* 场景描写 - 深邃星空块 */
        scene {
            display: block;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08) 0%, rgba(163, 113, 247, 0.05) 100%);
            border: 1px solid var(--border-default);
            border-left: 3px solid var(--accent-blue);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 1.2em 0;
            text-indent: 0;
            font-style: italic;
            color: var(--text-secondary);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.05);
        }
        scene::before {
            content: "✧ ";
            color: var(--accent-blue);
        }

        /* 旁白 - 月光银色 */
        aside {
            display: block;
            text-align: center;
            margin: 1.5em 0;
            padding: 12px 20px;
            font-style: italic;
            color: var(--text-muted);
            text-indent: 0;
            position: relative;
        }
        aside::before {
            content: "— ✦ ";
            color: var(--text-muted);
            opacity: 0.6;
        }
        aside::after {
            content: " ✦ —";
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* ==================== 引用块 ==================== */
        .content blockquote {
            text-indent: 0;
            margin: 1.2em 0;
            padding: 18px 24px;
            background: var(--bg-elevated);
            border-left: 4px solid var(--accent-purple);
            border-radius: 0 10px 10px 0;
            color: var(--text-secondary);
            font-style: italic;
            box-shadow: 
                inset 0 0 30px rgba(163, 113, 247, 0.03),
                0 4px 15px rgba(0,0,0,0.2);
        }
        .content blockquote::before {
            content: "❝";
            display: block;
            font-size: 32px;
            color: var(--accent-purple);
            opacity: 0.4;
            margin-bottom: 8px;
            font-style: normal;
            line-height: 1;
        }

        /* ==================== 列表 ==================== */
        .content ul, .content ol {
            text-indent: 0;
            margin: 1em 0 1em 1.5em;
            padding-left: 0.5em;
            color: var(--text-primary);
        }
        .content li {
            margin-bottom: 0.5em;
        }
        .content ul li::marker {
            content: "◆ ";
            color: var(--accent-cyan);
        }
        .content ol li::marker {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* ==================== 分隔线 ==================== */
        .content hr {
            border: none;
            height: 1px;
            margin: 2em 0;
            background: linear-gradient(
                to right,
                transparent,
                var(--border-default) 20%,
                var(--accent-purple) 50%,
                var(--border-default) 80%,
                transparent
            );
            position: relative;
        }
        .content hr::after {
            content: "✧";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            padding: 0 15px;
            color: var(--accent-purple);
            font-size: 14px;
        }

        /* ==================== 代码 ==================== */
        .content code {
            background: var(--bg-elevated);
            color: var(--accent-cyan);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
            font-size: 0.88em;
            border: 1px solid var(--border-default);
            /* ★ 代码换行 */
            white-space: pre-wrap !important;
            word-break: break-all !important;
        }
        .content pre {
            background: linear-gradient(180deg, var(--bg-elevated) 0%, #1a1f28 100%);
            padding: 18px 22px;
            border-radius: 10px;
            margin: 1.2em 0;
            overflow-x: auto;
            border: 1px solid var(--border-default);
            text-indent: 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
            /* ★ 预格式化换行 */
            white-space: pre-wrap !important;
            word-break: break-all !important;
        }
        .content pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-primary);
        }

        /* ==================== 表格 ==================== */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.2em 0;
            font-size: 0.95em;
            /* ★ 固定布局 */
            table-layout: fixed;
        }
        .content th, .content td {
            padding: 12px 16px;
            text-align: left;
            border: 1px solid var(--border-default);
            /* ★ 单元格换行 */
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .content th {
            background: var(--bg-elevated);
            color: var(--accent-blue);
            font-weight: 600;
        }
        .content td {
            background: rgba(255,255,255,0.02);
        }
        .content tr:hover td {
            background: rgba(88, 166, 255, 0.05);
        }

        /* ==================== ★★★ Details 折叠块（关键修复）★★★ ==================== */
        .content details {
            margin: 1.2em 0;
            border: 1px solid var(--border-default);
            border-radius: 10px;
            background: var(--bg-elevated);
            overflow: hidden;
            /* ★ 固定宽度 */
            width: 100%;
            max-width: 100%;
        }
        
        .content summary {
            padding: 14px 20px;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.1) 0%, rgba(163, 113, 247, 0.05) 100%);
            color: var(--accent-blue);
            user-select: none;
            text-indent: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            /* ★ summary 换行 */
            white-space: normal !important;
            word-break: break-word !important;
        }
        .content summary::before {
            content: "▸";
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .content summary:hover {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15) 0%, rgba(163, 113, 247, 0.08) 100%);
        }
        .content details[open] summary {
            border-bottom: 1px solid var(--border-default);
        }
        .content details[open] summary::before {
            transform: rotate(90deg);
        }
        
        /* ★★★ details 内容区：强制换行 ★★★ */
        .content details > *:not(summary) {
            padding: 16px 20px;
            white-space: normal !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-wrap: anywhere !important;
        }
        
        .content details p {
            text-indent: 0;
            margin-bottom: 0.5em;
            white-space: normal !important;
        }
        
        .content details div {
            white-space: normal !important;
            word-break: break-word !important;
        }

        /* ==================== 强调文本 ==================== */
        .content strong {
            color: var(--accent-pink);
            font-weight: 600;
        }
        .content em {
            color: var(--accent-purple);
            font-style: italic;
        }

        /* ==================== 底部装饰 ==================== */
        .night-footer {
            margin-top: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 6px;
            opacity: 0.5;
        }

        /* ==================== 选中文本样式 ==================== */
        ::selection {
            background: rgba(163, 113, 247, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="night-page">
        <!-- 星星装饰 -->
        <div class="stars">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>
        
        <!-- 月亮装饰 -->
        <div class="moon"></div>
        
        <!-- 内容区 -->
        <div class="content">{{content}}</div>
       
        <!-- 底部装饰 -->
        <div class="night-footer">☽ · ✦ · ☾</div>
    </div>
</body>
</html>
