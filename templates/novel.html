<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "SimSun", serif;
            background: #4a4a4a;
            padding: 40px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .page {
            background: #fdf6e3;
            background-image: linear-gradient(to right, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0) 5%, rgba(0,0,0,0) 95%, rgba(0,0,0,0.02) 100%);
            width: 100%;
            max-width: 700px;
            padding: 60px 50px;
            overflow-x: hidden;
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.1),
                0 10px 40px rgba(0,0,0,0.4);
            position: relative;
            min-width: 350px;
        }

        .page::before {
            content: "";
            position: absolute;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 1px;
            border-left: 1px dashed #d3c6a6;
        }

        .content {
            font-size: 18px;
            line-height: 2.0;
            color: #2b2b2b;
            text-align: justify;
        }

        /* 段落 */
        .content p {
            margin-bottom: 0.5em;
            text-indent: 2em;
        }
        .content p:last-child { margin-bottom: 0; }
        
        /* 标题 */
        .content h1, .content h2, .content h3 {
            text-indent: 0;
            text-align: center;
            font-weight: bold;
            color: #1a1a1a;
            margin-top: 1.5em;
            margin-bottom: 1em;
        }
        .content h1 { font-size: 24px; margin-top: 0; }
        
        /* 引用块 */
        .content blockquote {
            text-indent: 0;
            margin: 1.5em 2em;
            padding: 0 1em;
            border-left: 3px solid #d3c6a6;
            color: #666;
            font-style: italic;
        }

        /* 列表 */
        .content ul, .content ol {
            text-indent: 0;
            margin-left: 2em;
            margin-bottom: 1em;
        }

        /* 分割线 */
        .content hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.2), rgba(0,0,0,0));
            margin: 3em 0;
        }

        /* ===== 语义标签样式 ===== */
        
        /* 对话 */
        q {
            color: #8B4513;
            font-style: normal;
            background: rgba(139, 69, 19, 0.06);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        q::before { 
            content: """; 
            color: #c9b896; 
            font-weight: bold;
            font-size: 1.1em;
        }
        q::after { 
            content: """; 
            color: #c9b896; 
            font-weight: bold;
            font-size: 1.1em;
        }
        
        /* 内心想法 */
        inner {
            color: #808080;
            font-style: italic;
            background: rgba(128, 128, 128, 0.08);
            padding: 2px 6px;
            border-radius: 3px;
        }
        inner::before { content: "（"; opacity: 0.5; }
        inner::after { content: "）"; opacity: 0.5; }
        
        /* 动作描写 */
        act {
            color: #696969;
            font-style: italic;
            font-weight: 500;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-decoration-color: rgba(105, 105, 105, 0.3);
            text-underline-offset: 3px;
        }
        
        /* 场景描写 */
        scene {
            display: block;
            color: #5a6a5a;
            background: linear-gradient(to right, rgba(201,184,150,0.2), transparent);
            padding: 10px 16px;
            border-left: 3px solid #c9b896;
            margin: 1em 0;
            text-indent: 0;
            font-style: italic;
        }
        
        /* 旁白 */
        aside {
            display: block;
            color: #888;
            font-size: 0.9em;
            text-align: center;
            margin: 1.5em 0;
            font-style: italic;
            text-indent: 0;
        }
        aside::before { content: "※ "; }
        aside::after { content: " ※"; }

        /* ===== 修复超出边界问题 ===== */
        
        .content * {
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .content details {
            margin: 1em 0;
            padding: 0;
            border: 1px solid #d3c6a6;
            border-radius: 6px;
            background: rgba(201, 184, 150, 0.05);
        }
        
        .content summary {
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(201, 184, 150, 0.1);
            border-radius: 6px 6px 0 0;
            user-select: none;
            text-indent: 0;
            word-break: break-word;
        }
        
        .content summary:hover {
            background: rgba(201, 184, 150, 0.15);
        }
        
        .content details[open] summary {
            border-bottom: 1px solid #d3c6a6;
            margin-bottom: 10px;
        }
        
        .content details > *:not(summary) {
            padding: 0 16px 10px 16px;
            text-indent: 0;
        }
        
        .content details p,
        .content details div,
        .content details li {
            word-break: break-all;
            white-space: normal;
            overflow-wrap: anywhere;
        }
        /* —— 保留原始换行 + 取消两端对齐 —— */
        .content details,
        .content details * {
            white-space: pre-wrap; /* \n ⇒ 换行 */
        }

            .content details p {
                text-align: left; /* 关闭两端对齐，防止拉伸 */
            }        
        .content pre,
        .content code {
            word-break: normal;
            overflow-x: auto;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="content">{{content}}</div>
    </div>
</body>
</html>
