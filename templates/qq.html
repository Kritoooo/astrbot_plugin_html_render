<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ Template</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ================== 基础设置 ================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ================== 核心：适配插件生成的类名 ================== */
        
        /* 1. 容器：让内容垂直排列 */
        .chat-content-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            /* 底部留白，防止被输入框遮挡 */
            padding-bottom: 20px;
        }

        /* 2. 旁白/普通文本/Markdown段落 -> 转换为系统消息（灰色小字） */
        /* 插件生成的非气泡内容通常是 p, div.narration 或直接的文本 */
        .chat-content-area > p, 
        .narration, 
        .card { 
            align-self: center;
            color: #5c6b8f; /* QQ特有的蓝灰色系统字 */
            font-size: 12px;
            background: transparent;
            margin: 10px 0;
            padding: 2px 8px;
            text-align: center;
            border: none;
            box-shadow: none;
            max-width: 85%;
            width: auto;
        }

        /* 3. 左侧气泡 (对方) - 覆盖插件的 .bubble 样式 */
        .bubble {
            align-self: flex-start;
            background-color: #262626 !important; /* 深灰色背景 */
            color: #ffffff !important;
            border-radius: 12px !important;
            border-top-left-radius: 2px !important; /* 尖角 */
            padding: 10px 14px !important;
            margin-bottom: 15px !important;
            margin-left: 45px !important; /* 留出头像位置 */
            margin-right: 15px; /* 防止太宽 */
            position: relative;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: none !important;
            background: none; /* 清除原有渐变 */
            word-wrap: break-word;
        }

        /* 模拟左侧头像 */
        .bubble::before {
            content: '';
            position: absolute;
            left: -40px;
            top: 0;
            width: 35px;
            height: 35px;
            /* 这里使用随机头像，也可以换成固定的机器人头像链接 */
            background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix');
            background-color: #1a1a1a;
            background-size: cover;
            border-radius: 50%;
            border: 1px solid #333;
        }
        /* 模拟左侧昵称 */
        .bubble::after {
            content: '群友';
            position: absolute;
            top: -18px;
            left: 0;
            font-size: 11px;
            color: #666;
        }

        /* 4. 右侧气泡 (自己) - 覆盖插件的 .bubble.right 样式 */
        .bubble.right {
            align-self: flex-end;
            background-color: #0099ff !important; /* QQ 蓝色 */
            color: #ffffff !important;
            border-radius: 12px !important;
            border-top-right-radius: 2px !important; /* 尖角 */
            border-top-left-radius: 12px !important;
            margin-right: 45px !important; /* 留出头像位置 */
            margin-left: 15px !important;
            background: none; /* 清除原有渐变 */
        }

        /* 模拟右侧头像 */
        .bubble.right::before {
            content: '';
            position: absolute;
            right: -40px;
            top: 0;
            width: 35px;
            height: 35px;
            background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Princess');
            background-color: #1a1a1a;
            background-size: cover;
            border-radius: 50%;
            border: 1px solid #333;
        }
        /* 隐藏右侧昵称或显示为"我" */
        .bubble.right::after {
            content: '我';
            position: absolute;
            top: -18px;
            right: 0;
            left: auto;
            font-size: 11px;
            color: #666;
            text-align: right;
        }
        
        /* ================== Markdown 内容适配 ================== */
        .bubble pre {
            background: rgba(0,0,0,0.2) !important;
            border-radius: 6px;
            padding: 8px;
            overflow-x: auto;
            margin: 5px 0;
        }
        .bubble code {
            font-family: Consolas, Monaco, monospace;
            font-size: 0.9em;
            background: rgba(0,0,0,0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }
        .bubble a {
            color: #60a5fa; /* 链接颜色 */
            text-decoration: underline;
        }
        .bubble img {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 5px;
        }

        /* 底部导航栏磨砂效果 */
        .glass-nav {
            background-color: #111111;
            border-top: 1px solid #1f1f1f;
        }
    </style>
</head>
<body class="flex justify-center w-full bg-black text-white overflow-hidden">

    <!-- 手机外壳容器 -->
    <div class="w-full max-w-md min-h-[100px] flex flex-col bg-[#0b0b0b] relative shadow-2xl overflow-hidden border-x border-gray-900">
        
        <!-- 顶部状态栏 -->
        <div class="h-8 w-full flex justify-between items-center px-4 text-xs font-medium text-gray-300 bg-[#111111] z-20 select-none">
            <span>18:25</span>
            <div class="flex items-center space-x-1">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- 顶部导航栏 -->
        <div class="h-14 flex items-center justify-between px-3 bg-[#111111] z-20 border-b border-[#1f1f1f] shrink-0 select-none">
            <div class="flex items-center">
                <i class="fas fa-chevron-left text-gray-300 text-lg mr-1 p-2"></i>
                <div class="bg-gray-700 rounded-full px-2 py-0.5 text-xs text-gray-300 mr-2">99+</div>
                <div class="text-base font-semibold truncate max-w-[200px]">群聊 (74)</div>
            </div>
            <div class="text-xl text-gray-300 mr-2 p-2">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <!-- 聊天内容区域 -->
        <!-- 注意：这里的 pb-32 是为了给底部输入框留出足够的空间 -->
        <div class="flex-1 overflow-y-auto p-3 bg-[#0b0b0b] relative pb-32" id="chat-container">
            
            <!-- 注入的内容区域 -->
            <div class="chat-content-area">
                <!-- 
                   插件会将内容替换到这里。
                   "Narration" -> 灰色系统字
                   "Bubble" -> 左侧气泡
                   "Bubble Right" -> 右侧蓝色气泡
                -->
                {{content}}
            </div>

        </div>

        <!-- 底部输入区域 (装饰用) -->
        <div class="absolute bottom-0 w-full glass-nav pb-4 pt-2 z-30 select-none">
            <!-- 工具栏图标行 -->
            <div class="flex items-center px-5 mb-3 space-x-7">
                <div class="flex items-center gap-2 text-gray-400">
                    <i class="fas fa-microphone text-gray-400 text-xl"></i>
                </div>
                <div class="flex items-center gap-2 text-gray-400">
                    <i class="far fa-image text-gray-400 text-xl"></i>
                </div>
                <div class="flex items-center gap-2 text-gray-400">
                    <i class="fas fa-camera text-gray-400 text-xl"></i>
                </div>
                 <div class="flex-1"></div>
                 <div class="flex items-center gap-2 text-gray-400">
                    <i class="fas fa-folder text-gray-400 text-xl"></i>
                 </div>
            </div>

            <!-- 输入框行 -->
            <div class="flex items-end px-3 gap-2">
                <!-- 文本输入框 -->
                <div class="flex-1 bg-[#1e1e1e] rounded-full min-h-[36px] flex items-center px-4 relative mb-1">
                    <span class="text-gray-500 text-sm">发送消息...</span>
                </div>
                
                <!-- 表情 -->
                <div class="text-gray-400 p-2 h-10 w-10 flex items-center justify-center">
                    <i class="far fa-smile text-2xl"></i>
                </div>

                 <!-- 加号 -->
                 <div class="text-gray-400 p-2 h-10 w-10 flex items-center justify-center">
                    <i class="fas fa-plus-circle text-2xl"></i>
                </div>

                <!-- 发送按钮 -->
                <div class="bg-[#005fb8] text-white text-xs px-4 py-1.5 rounded-lg font-medium self-center mb-1 ml-1">
                    发送
                </div>
            </div>
        </div>

    </div>
</body>
</html>
