<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-width: 560px;
      --paper: #f8f0e3;
      --paper-deep: #f0e2ce;
      --ink: #2d221b;
      --muted: #7d6758;
      --accent: #b65b3a;
      --accent-soft: rgba(182, 91, 58, 0.12);
      --gold: #d59d4e;
      --line: rgba(78, 53, 38, 0.14);
      --shadow: rgba(58, 33, 18, 0.16);
      --font-body: "Noto Serif SC", "Songti SC", "STSong", serif;
      --font-script: "Zhi Mang Xing", cursive;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      padding: 32px;
      display: inline-block;
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(213, 157, 78, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(182, 91, 58, 0.14), transparent 26%),
        linear-gradient(135deg, #d9c3a4, #efe4d0 45%, #d3baa0);
    }

    .sheet {
      width: var(--page-width);
      max-width: var(--page-width);
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0)),
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 34px,
          rgba(125, 103, 88, 0.045) 34px,
          rgba(125, 103, 88, 0.045) 35px
        ),
        linear-gradient(180deg, var(--paper), var(--paper-deep));
      box-shadow:
        0 2px 0 rgba(255,255,255,0.35) inset,
        0 28px 50px var(--shadow);
      border: 1px solid rgba(104, 76, 58, 0.14);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(181, 129, 84, 0.2);
      border-radius: 18px;
      pointer-events: none;
    }

    .sheet::after {
      content: "";
      position: absolute;
      top: -110px;
      right: -90px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(213, 157, 78, 0.22), transparent 70%);
      pointer-events: none;
    }

    .header {
      position: relative;
      padding: 34px 38px 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.46);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid rgba(104, 76, 58, 0.1);
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 18px;
      height: 1px;
      background: rgba(125, 103, 88, 0.35);
    }

    .title {
      margin-top: 18px;
      font-size: 34px;
      line-height: 1.2;
      color: #4b2e1e;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .signature {
      position: absolute;
      right: 34px;
      top: 28px;
      font-family: var(--font-script);
      font-size: 34px;
      color: rgba(182, 91, 58, 0.28);
      transform: rotate(-7deg);
      user-select: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 38px;
      color: rgba(125, 103, 88, 0.5);
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .divider span {
      font-size: 12px;
      letter-spacing: 3px;
    }

    .content-wrap {
      padding: 24px 38px 34px;
    }

    .content {
      width: 100%;
      max-width: 100%;
      font-size: 16px;
      line-height: 2.05;
      color: var(--ink);
    }

    .content, .content * {
      max-width: 100% !important;
      word-wrap: break-word !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      box-sizing: border-box !important;
    }

    .content p {
      margin-bottom: 1em;
      text-indent: 2em;
    }

    .content p:first-child {
      text-indent: 0;
    }

    .content p:first-child::first-letter {
      float: left;
      margin: 6px 10px 0 0;
      font-size: 3.1em;
      line-height: 0.9;
      color: var(--accent);
      font-weight: 700;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      margin: 1.4em 0 0.8em;
      text-indent: 0;
      line-height: 1.35;
      color: #4a2b1d;
    }

    .content h1 {
      font-size: 28px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(182, 91, 58, 0.18);
    }

    .content h2 {
      font-size: 22px;
      padding-left: 12px;
      border-left: 4px solid var(--accent);
    }

    .content h3 {
      font-size: 18px;
      color: #8d4d34;
    }

    .content blockquote {
      margin: 1.2em 0;
      padding: 16px 18px;
      border-radius: 16px;
      text-indent: 0;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(182, 91, 58, 0.14);
      color: #634738;
      box-shadow: 0 10px 18px rgba(107, 69, 43, 0.06);
    }

    .content ul,
    .content ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    .content li {
      margin: 0.45em 0;
    }

    .content code {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(92, 55, 36, 0.08);
      color: #8c452b;
      font-size: 0.92em;
    }

    .content pre {
      margin: 1.1em 0;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(66, 43, 29, 0.92);
      color: #f5e8d7;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .content pre code {
      padding: 0;
      background: none;
      color: inherit;
    }

    .content hr {
      margin: 1.6em 0;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(182, 91, 58, 0.35), transparent);
    }

    q {
      display: inline;
      quotes: none;
      font-style: normal;
      color: #8b3f2a;
      background: linear-gradient(180deg, transparent 35%, rgba(213, 157, 78, 0.2) 35%);
      padding: 0 4px;
    }

    q::before { content: "「"; color: var(--accent); }
    q::after { content: "」"; color: var(--accent); }

    inner {
      display: inline;
      padding: 2px 10px;
      border-radius: 999px;
      font-style: italic;
      color: #775a77;
      background: rgba(137, 113, 140, 0.12);
    }

    inner::before { content: "· "; }
    inner::after { content: " ·"; }

    act {
      display: inline;
      color: #9b5a26;
      font-style: italic;
      text-decoration: underline;
      text-decoration-color: rgba(155, 90, 38, 0.22);
      text-underline-offset: 4px;
    }

    scene {
      display: block;
      margin: 1.2em 0;
      padding: 16px 18px;
      border-left: 4px solid var(--gold);
      border-radius: 0 14px 14px 0;
      text-indent: 0;
      background: linear-gradient(90deg, rgba(213, 157, 78, 0.16), rgba(255,255,255,0.12));
      color: #6a5647;
    }

    aside {
      display: block;
      margin: 1.3em auto;
      text-indent: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95em;
      font-style: italic;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 0 38px 30px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .footer-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(104, 76, 58, 0.1);
    }

    .seal {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: rgba(182, 91, 58, 0.8);
      border: 2px solid rgba(182, 91, 58, 0.35);
      box-shadow: inset 0 0 0 3px rgba(182, 91, 58, 0.08);
      font-size: 12px;
      letter-spacing: 2px;
      transform: rotate(-10deg);
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="header">
      <div class="eyebrow">Amber Letter</div>
      <div class="signature">字里有光</div>
      <h1 class="title">琥珀信笺</h1>
      <p class="subtitle">暖纸张、旧铜色、偏文学杂志感的阅读模板</p>
    </div>
    <div class="divider"><span>READING NOTE</span></div>
    <div class="content-wrap">
      <div class="content">{{content}}</div>
    </div>
    <div class="footer">
      <div class="footer-badge">HTML Render Template</div>
      <div class="seal">文稿</div>
    </div>
  </div>
</body>
</html>
